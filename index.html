<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brasileirão Série A · Escudos 3D</title>
<style>
  :root{ --c1:#C52613; --c2:#111111; --bg:#04050a; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;}

  /* fundo colorido por time */
  .bg{position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(1200px 820px at 26% 42%, color-mix(in srgb,var(--c1) 30%,transparent) 0%, transparent 60%),
      radial-gradient(900px 720px at 82% 78%, color-mix(in srgb,var(--c2) 42%,transparent) 0%, transparent 60%),
      linear-gradient(160deg,#04050a 0%,#090b13 100%);
    transition:background .8s ease;}

  /* canvas WebGL */
  #gl{position:fixed; inset:0; z-index:1; pointer-events:none;}

  /* carregando */
  #boot{position:fixed; inset:0; z-index:20; display:grid; place-items:center; background:#04050a; transition:opacity .6s ease;}
  #boot .ring{width:54px;height:54px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--c1);animation:sp 1s linear infinite;}
  #boot p{position:absolute; margin-top:96px; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.5);}
  @keyframes sp{to{transform:rotate(360deg);}}
  #boot.gone{opacity:0; pointer-events:none;}

  /* HUD */
  .hud{position:fixed; inset:0; z-index:6; pointer-events:none; padding:26px 40px;
       display:flex; justify-content:space-between; align-items:flex-start;
       letter-spacing:3px; font-size:12px; text-transform:uppercase; color:rgba(255,255,255,.72);}
  .hud b{color:#fff;}
  .counter{font-variant-numeric:tabular-nums; font-size:14px; opacity:0; transition:opacity .4s ease;}
  .counter.show{opacity:1;}
  .pbar{position:fixed; left:0; bottom:0; height:4px; width:100%; background:rgba(255,255,255,.08); z-index:6;}
  .pbar>i{display:block; height:100%; width:0%;
          background:linear-gradient(90deg,var(--c1),color-mix(in srgb,var(--c1) 40%,#fff)); transition:background .5s ease;}

  /* HERO */
  .hero{position:relative; z-index:5; height:100vh; display:grid; place-items:center; text-align:center; pointer-events:none;}
  .hero .kick{font-size:13px; letter-spacing:6px; text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:20px;}
  .hero h1{font-size:clamp(40px,9vw,118px); font-weight:800; letter-spacing:-2px; line-height:.94;
           background:linear-gradient(180deg,#fff,#98a0b0); -webkit-background-clip:text; background-clip:text; color:transparent;
           filter:drop-shadow(0 8px 30px rgba(0,0,0,.5));}
  .hero .sub{margin-top:20px; font-size:15px; letter-spacing:2px; color:rgba(255,255,255,.62);}
  .hero .mouse{margin:42px auto 0; width:24px; height:38px; border:2px solid rgba(255,255,255,.5); border-radius:13px; position:relative;}
  .hero .mouse::after{content:""; position:absolute; left:50%; top:7px; width:3px; height:8px; background:#fff; border-radius:2px;
                      transform:translateX(-50%); animation:wheel 1.6s ease-in-out infinite;}
  @keyframes wheel{0%{opacity:1;top:7px}60%{opacity:0;top:18px}100%{opacity:0}}

  /* seções de time (só texto; o escudo é WebGL) */
  .team{position:relative; z-index:5; height:190vh; pointer-events:none;}
  .team .pin{position:sticky; top:0; height:100vh; display:grid; grid-template-columns:1fr 1fr; align-items:center;
             max-width:1240px; margin:0 auto; padding:0 52px;}
  .info{max-width:520px; grid-column:2;}
  .info .idx{font-size:13px; letter-spacing:4px; color:color-mix(in srgb,var(--c1) 55%,#fff); font-weight:700;}
  .info h2{font-size:clamp(34px,4.6vw,66px); font-weight:800; letter-spacing:-1px; line-height:1; margin:10px 0 14px;
           text-shadow:0 6px 30px rgba(0,0,0,.5);}
  .info .meta{font-size:13px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:22px;}
  .info .lbl{font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:10px;}
  .titles{display:flex; flex-wrap:wrap; gap:9px; margin-bottom:24px;}
  .titles span{font-size:13px; padding:7px 14px; border-radius:999px; font-weight:600; backdrop-filter:blur(6px);
               background:color-mix(in srgb,var(--c1) 22%, rgba(255,255,255,.05));
               border:1px solid color-mix(in srgb,var(--c1) 55%, transparent); color:#fff;
               transition:background .6s ease,border-color .6s ease;}
  .info p{font-size:16.5px; line-height:1.65; color:rgba(255,255,255,.82); text-shadow:0 2px 18px rgba(0,0,0,.5);}
  .anim{opacity:0; transform:translateY(34px); will-change:transform,opacity;}

  /* QUIZ: Escalação do Investidor */
  .quiz{position:relative; z-index:5; min-height:100vh; display:grid; place-items:center; padding:12vh 24px 10vh;}
  .qcard{width:min(600px,94vw); background:rgba(10,12,20,.55); border:1px solid rgba(255,255,255,.12); border-radius:24px;
         padding:34px 34px 30px; backdrop-filter:blur(14px); box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .qkick{font-size:11px; letter-spacing:4px; text-transform:uppercase; color:color-mix(in srgb,var(--c1) 60%,#fff); margin-bottom:12px; font-weight:700;}
  .qtitle{font-size:clamp(24px,3.4vw,36px); font-weight:800; letter-spacing:-.5px; line-height:1.15; margin-bottom:10px;}
  .qsub{font-size:15px; line-height:1.6; color:rgba(255,255,255,.7); margin-bottom:8px;}
  .qbtn{display:block; width:100%; text-align:left; margin-top:10px; padding:14px 18px; border-radius:14px; cursor:pointer;
        font:600 15px/1.45 "Segoe UI",sans-serif; color:#fff;
        background:color-mix(in srgb,var(--c1) 14%, rgba(255,255,255,.04));
        border:1px solid color-mix(in srgb,var(--c1) 45%, transparent);
        transition:transform .15s ease, background .2s ease;}
  .qbtn:hover{transform:translateY(-2px); background:color-mix(in srgb,var(--c1) 30%, rgba(255,255,255,.06));}
  .qbtn b{display:block; font-size:12px; letter-spacing:2px; text-transform:uppercase; opacity:.65; margin-bottom:3px;}
  .qprog{font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.5); margin-bottom:8px; font-variant-numeric:tabular-nums;}
  .qresult{text-align:center;}
  .qresult .formation{font-size:52px; font-weight:800; letter-spacing:2px; line-height:1; color:color-mix(in srgb,var(--c1) 60%,#fff);}
  .alloc{margin:20px 0 4px; text-align:left;}
  .alloc .row{display:flex; align-items:center; gap:10px; margin:8px 0; font-size:13px;}
  .alloc .row span:first-child{width:150px; color:rgba(255,255,255,.75);}
  .alloc .bar{flex:1; height:9px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden;}
  .alloc .bar i{display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,var(--c1),color-mix(in srgb,var(--c1) 45%,#fff));}
  .alloc .pct{width:44px; text-align:right; font-variant-numeric:tabular-nums; color:rgba(255,255,255,.85);}
  .qactions{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:20px;}
  .qactions .qbtn{width:auto; display:inline-block; text-align:center; margin-top:0;}
  .qspacer{height:46vh; pointer-events:none;} /* abre espaço pro brasão 3D girar acima do card */

  @media (max-width:880px){
    .team{height:210vh;}
    .team .pin{grid-template-columns:1fr; padding:0 26px; align-content:end;}
    .info{grid-column:1; max-width:100%; text-align:center; margin:0 auto 9vh;}
    .titles{justify-content:center;}
    .info h2{font-size:clamp(30px,8vw,48px);}
    .hud{padding:18px 22px;}
  }
</style>
</head>

function drawStar(x,cx,cy,r){ x.beginPath();
  for(let i=0;i<10;i++){ const a=Math.PI/5*i-Math.PI/2, rr=i%2?r*0.45:r;
    i?x.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):x.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr); }
  x.closePath(); x.fill(); }

/* brasão exclusivo da carteira do usuário (vai pro escudo 3D no resultado) */
function makeCustomCrest(pr){
  const s=1024, c=document.createElement("canvas"); c.width=c.height=s; const x=c.getContext("2d");
  const P=(nx,ny)=>[nx*s,ny*s];
  const path=()=>{ x.beginPath();
    x.moveTo(...P(0.5,0.05)); x.lineTo(...P(0.93,0.17)); x.lineTo(...P(0.93,0.55));
    x.quadraticCurveTo(...P(0.93,0.85),...P(0.5,0.97));
    x.quadraticCurveTo(...P(0.07,0.85),...P(0.07,0.55));
    x.lineTo(...P(0.07,0.17)); x.closePath(); };
  const g=x.createLinearGradient(0,0,0,s); g.addColorStop(0,pr.c1); g.addColorStop(1,pr.c2);
  path(); x.fillStyle=g; x.fill();
  path(); x.lineWidth=s*0.016; x.strokeStyle="rgba(255,255,255,0.92)"; x.stroke();
  const hi=x.createLinearGradient(0,0,0,s*0.5); hi.addColorStop(0,"rgba(255,255,255,0.28)"); hi.addColorStop(1,"rgba(255,255,255,0)");
  path(); x.fillStyle=hi; x.fill();
  x.fillStyle="#fff";
  for(let i=-1;i<=1;i++) drawStar(x, s*0.5+i*s*0.09, s*0.115, s*0.022);
  x.textAlign="center"; x.textBaseline="middle";
  x.font=`800 ${s*0.13}px Segoe UI, sans-serif`;
  x.fillText(pr.formation, s*0.5, s*0.235);
  x.fillRect(s*0.3, s*0.302, s*0.4, s*0.006);
  // escalação: ataque em cima, goleiro (dourado) embaixo
  const rows=pr.formation.split("-").map(Number).reverse(); rows.push(1);
  const ys=[0.40,0.53,0.66,0.79];
  rows.forEach((cnt,ri)=>{
    const y=ys[ri]*s, spread=s*0.125;
    for(let k=0;k<cnt;k++){
      const px=s*0.5+(k-(cnt-1)/2)*spread;
      x.beginPath(); x.arc(px,y,s*0.026,0,Math.PI*2);
      x.fillStyle= ri===rows.length-1 ? "#ffd75e" : "#ffffff"; x.fill();
      x.lineWidth=s*0.006; x.strokeStyle="rgba(0,0,0,0.35)"; x.stroke();
    }
  });
  x.fillStyle="rgba(255,255,255,0.9)"; x.font=`700 ${s*0.035}px Segoe UI, sans-serif`;
  x.fillText("CARTEIRA F.C.", s*0.5, s*0.885);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; tex.anisotropy=8;
  const d=document.createElement("canvas"); d.width=d.height=s; const dx=d.getContext("2d");
  dx.drawImage(c,0,0); dx.globalCompositeOperation="source-atop"; dx.fillStyle="rgba(10,12,16,0.85)"; dx.fillRect(0,0,s,s);
  const dark=new THREE.CanvasTexture(d); dark.colorSpace=THREE.SRGBColorSpace;
  return {tex,dark};
}

/* ---------------- TEXTURAS: escudo recortado + versão escura (miolo) ---------------- */
function loadImg(src){return new Promise(res=>{const im=new Image(); im.crossOrigin="anonymous"; im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src;});}

function makeCrestTextures(team,img){
  const s=1024, c=document.createElement("canvas"); c.width=c.height=s; const x=c.getContext("2d");
  if(img){
    const ar=(img.naturalWidth||1)/(img.naturalHeight||1);
    let w=s*0.86, h=s*0.86; if(ar>=1){h=w/ar;}else{w=h*ar;}
    x.drawImage(img,(s-w)/2,(s-h)/2,w,h);
  }else{
    x.fillStyle="#fff"; x.font=`800 ${s*0.28}px Segoe UI, sans-serif`; x.textAlign="center"; x.textBaseline="middle";
    x.fillText(team.abbr,s/2,s/2);
  }
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; tex.anisotropy=8;
  // versão escurecida (usada nas fatias internas = "espessura" do escudo)
  const d=document.createElement("canvas"); d.width=d.height=s; const dx=d.getContext("2d");
  dx.drawImage(c,0,0);
  dx.globalCompositeOperation="source-atop"; dx.fillStyle="rgba(10,12,16,0.85)"; dx.fillRect(0,0,s,s);
  const dark=new THREE.CanvasTexture(d); dark.colorSpace=THREE.SRGBColorSpace;
  return {tex,dark};
}

function starSprite(){
  const s=64,c=document.createElement("canvas");c.width=c.height=s;const x=c.getContext("2d");
  const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,"rgba(255,255,255,1)");
  g.addColorStop(0.35,"rgba(255,255,255,0.45)");
  g.addColorStop(1,"rgba(255,255,255,0)");
  x.fillStyle=g; x.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

function nebulaTexture(hueA,hueB){
  const s=512, c=document.createElement("canvas"); c.width=c.height=s; const x=c.getContext("2d");
  // muitas manchas radiais suaves e fracas = nuvem gasosa
  for(let i=0;i<70;i++){
    const px=Math.random()*s, py=Math.random()*s, r=s*(0.06+Math.random()*0.22);
    const hue=hueA+(hueB-hueA)*Math.random();
    const g=x.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,`hsla(${hue},65%,58%,${0.04+Math.random()*0.05})`);
    g.addColorStop(1,`hsla(${hue},65%,58%,0)`);
    x.fillStyle=g; x.fillRect(0,0,s,s);
  }
  // esvanece as bordas do plano pra não aparecer o retângulo
  const mask=x.createRadialGradient(s/2,s/2,s*0.12,s/2,s/2,s*0.5);
  mask.addColorStop(0,"rgba(0,0,0,0)"); mask.addColorStop(1,"rgba(0,0,0,1)");
  x.globalCompositeOperation="destination-out"; x.fillStyle=mask; x.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

/* ---------------- CENA WEBGL ---------------- */
const canvas=document.getElementById("gl");
const boot=document.getElementById("boot");
let renderer,scene,camera,composer,shield,frontMat,backMat,midMat,rimLightA,keyGlow,starsA,starsB,starsC,nebA,nebB,sets=[];
let frontTeam=0, backTeam=1, midTeam=0, lastActive=-2;
let customSet=null, shieldScale=1;
let baseX=-1.25, baseY=-0.12;
const mouse={x:0,y:0};
const state={i:0,p:0.5,active:-1,heroT:0,inQuiz:false};
let secTops=[], heroSpan=1, quizTop=Infinity;

async function init(){
  const imgs=await Promise.all(teams.map(t=>loadImg(t.img)));
  sets=teams.map((t,i)=>makeCrestTextures(t,imgs[i]));

  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:"high-performance"});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.05;
  renderer.outputColorSpace=THREE.SRGBColorSpace;

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0,0,4.6);

  const pmrem=new THREE.PMREMGenerator(renderer);
  scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

  /* ---- escudo 3D: silhueta com espessura (fatias empilhadas) ---- */
  shield=new THREE.Group();
  const W=2.75, TH=0.2, LAYERS=24;
  const plane=new THREE.PlaneGeometry(W,W);
  frontMat=new THREE.MeshPhysicalMaterial({map:sets[0].tex, alphaTest:0.3, metalness:0.3, roughness:0.4,
                                           clearcoat:1, clearcoatRoughness:0.16, envMapIntensity:0.95, side:THREE.FrontSide});
  backMat=frontMat.clone();
  backMat.map=sets[1].tex;   // o verso já nasce com o próximo escudo (flip de carta real)
  midMat=new THREE.MeshBasicMaterial({map:sets[0].dark, alphaTest:0.3, side:THREE.DoubleSide});
  const front=new THREE.Mesh(plane,frontMat); front.position.z=TH/2;
  const back =new THREE.Mesh(plane,backMat);  back.position.z=-TH/2; back.rotation.y=Math.PI;
  shield.add(front,back);
  for(let l=1;l<LAYERS;l++){
    const m=new THREE.Mesh(plane,midMat);
    m.position.z=-TH/2 + TH*l/LAYERS;
    shield.add(m);
  }
  shield.position.set(baseX,baseY,0);
  scene.add(shield);

  /* ---- luzes (contidas: nada de estourar branco) ---- */
  scene.add(new THREE.AmbientLight(0xffffff,0.4));
  const key=new THREE.DirectionalLight(0xffffff,1.6); key.position.set(3,4,5); scene.add(key);
  rimLightA=new THREE.PointLight(0xC52613,70,20,2); rimLightA.position.set(-3,1.5,2.5); scene.add(rimLightA);
  const fill=new THREE.PointLight(0xffffff,30,20,2); fill.position.set(3,-2,1.5); scene.add(fill);
  keyGlow=new THREE.PointLight(0xC52613,12,30,2); keyGlow.position.set(baseX,baseY,-2.6); scene.add(keyGlow);

  /* ---- piso espelhado (mais leve) ---- */
  const floor=new Reflector(new THREE.CircleGeometry(9,64),{textureWidth:512,textureHeight:512,color:0x0a0c12});
  floor.rotation.x=-Math.PI/2; floor.position.y=-1.62; scene.add(floor);

  /* ---- céu: estrelas com cor de temperatura real + nebulosas ---- */
  const sprite=starSprite();
  // paleta de temperatura estelar: azuladas, brancas, amareladas, alaranjadas
  const palette=[[0.72,0.82,1],[0.85,0.9,1],[1,1,1],[1,1,1],[1,0.92,0.78],[1,0.78,0.62]];
  const mkStars=(cnt,size,opacity,spread)=>{
    const pos=new Float32Array(cnt*3), col=new Float32Array(cnt*3);
    for(let i=0;i<cnt;i++){
      pos[i*3]=(Math.random()-0.5)*spread; pos[i*3+1]=(Math.random()-0.35)*12; pos[i*3+2]=(Math.random()-0.5)*12-3;
      const c=palette[(Math.random()*palette.length)|0];
      col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute("position",new THREE.BufferAttribute(pos,3));
    g.setAttribute("color",new THREE.BufferAttribute(col,3));
    const m=new THREE.PointsMaterial({map:sprite,size,transparent:true,opacity,depthWrite:false,vertexColors:true,
                                      blending:THREE.AdditiveBlending,sizeAttenuation:true});
    const p=new THREE.Points(g,m); scene.add(p); return p;
  };
  starsA=mkStars(750,0.032,0.85,20);  // poeira estelar fina
  starsB=mkStars(220,0.06,0.5,18);    // estrelas médias
  starsC=mkStars(45,0.11,0.38,16);    // estrelas de destaque (cintilam)

  // nebulosas procedurais bem sutis (via-láctea ao fundo)
  const mkNebula=(hueA,hueB,w,h,px,py,pz,rot,op)=>{
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
      new THREE.MeshBasicMaterial({map:nebulaTexture(hueA,hueB),transparent:true,opacity:op,depthWrite:false,
                                   blending:THREE.AdditiveBlending}));
    m.position.set(px,py,pz); m.rotation.z=rot; scene.add(m); return m;
  };
  nebA=mkNebula(210,265,26,14, 4, 2,-9,-0.4,0.5);   // azul-índigo
  nebB=mkNebula(275,330,20,12,-6,-3,-10,0.5,0.32);  // violeta-rosado

  /* ---- pós-processamento (bloom) ---- */
  composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.32,0.4,0.9));
  composer.addPass(new OutputPass());

  measure(); layout();
  addEventListener("resize",onResize,{passive:true});
  addEventListener("pointermove",e=>{mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=(e.clientY/innerHeight)*2-1;},{passive:true});

  boot.classList.add("gone");
  window.__three3d={ok:true, faces:sets.length};
  // gancho de debug: executa um frame manualmente (para verificação offscreen)
  window.__tick=()=>{ readScroll();
    if(state.inQuiz && quiz.result){
      if(customSet){ frontMat.map=customSet.tex; backMat.map=customSet.tex; midMat.map=customSet.dark;
        frontMat.needsUpdate=backMat.needsUpdate=midMat.needsUpdate=true; frontTeam=backTeam=midTeam=-1; }
      shield.scale.setScalar(1); shield.position.x=0; shield.position.y=0.55;
    }else{
      shield.scale.setScalar(state.inQuiz?0.001:1);
      shield.rotation.y=targetRot(); swapByRotation();
    }
    composer.render();
    return {i:state.i, p:+state.p.toFixed(3), active:state.active, inQuiz:state.inQuiz,
            result:quiz.result?quiz.result.name:null,
            front:frontTeam, back:backTeam, mid:midTeam,
            rotYdeg:+(shield.rotation.y*180/Math.PI).toFixed(1),
            c1:getComputedStyle(document.documentElement).getPropertyValue('--c1').trim(),
            counter:counter.textContent}; };
  renderer.setAnimationLoop(animate);
}

/* geometria das seções medida UMA vez (e no resize) — nada de getBoundingClientRect por frame */
function measure(){
  secTops=sections.map(s=>({top:s.el.offsetTop, h:s.el.offsetHeight}));
  heroSpan=Math.max(1, secTops[0].top - innerHeight/2);
  quizTop=quizEl.offsetTop;
}
function layout(){
  const mobile=innerWidth<880;
  baseX = mobile?0:-1.25;
  baseY = mobile?1.05:-0.12;
  if(shield) shield.position.x=baseX;
  if(keyGlow) keyGlow.position.set(baseX,baseY,-2.6);
}
function onResize(){
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  measure(); layout();
}

/* estado a partir do scroll — matemática pura, sem leituras de layout */
function readScroll(){
  const vh=innerHeight, y=scrollY;
  const docMax=document.body.scrollHeight-vh;
  pbar.style.width=(clamp(y/docMax,0,1)*100).toFixed(2)+"%";

  // seção ativa = a que contém o centro da viewport; p vai de 0 (entra) a 1 (sai), 0.5 = centralizado
  const mid=y+vh/2;
  let active=-1,p=0.5;
  if(mid>=secTops[0].top){
    active=N-1; p=1;
    for(let k=0;k<N;k++){
      if(mid<secTops[k].top+secTops[k].h){ active=k; p=clamp((mid-secTops[k].top)/secTops[k].h,0,1); break; }
    }
  }
  state.active=active; state.i=active<0?0:active; state.p=active<0?0.5:p;
  state.heroT=clamp(y/heroSpan,0,1);

  // reveal dos textos: só as seções vizinhas do ativo
  const range=active<0?[0]:[active-1,active,active+1];
  const vis=new Set();
  for(const k of range){
    if(k<0||k>=N) continue;
    vis.add(k);
    const s=sections[k];
    const pp=clamp((mid-secTops[k].top)/secTops[k].h,0,1);
    const v=easeIO(clamp(Math.min(pp/0.22,(1-pp)/0.16),0,1));
    s.anims.forEach(a=>{a.style.opacity=v.toFixed(3); a.style.transform=`translateY(${((1-v)*32).toFixed(1)}px)`;});
    s.hidden=false;
  }
  for(let k=0;k<N;k++){
    if(!vis.has(k) && !sections[k].hidden){ sections[k].anims.forEach(a=>a.style.opacity="0"); sections[k].hidden=true; }
  }

  // zona do quiz (após o último time): HUD some e a cena assume a cor do quiz/perfil
  const inQuiz = mid >= quizTop;
  if(inQuiz!==state.inQuiz){
    state.inQuiz=inQuiz;
    lastActive=-99; // força reidratação de cor/HUD ao voltar pros times
    if(inQuiz){
      counter.classList.remove("show");
      const pr=quiz.result;
      rootStyle.setProperty("--c1",pr?pr.c1:"#4f6bff");
      rootStyle.setProperty("--c2",pr?pr.c2:"#101430");
      targetColor.set(pr?pr.c1:"#4f6bff");
    }
  }

  // cor/HUD seguem a seção ativa (troca exatamente com o escudo de perfil)
  if(!state.inQuiz && active!==lastActive){
    const t=teams[state.i];
    rootStyle.setProperty("--c1",t.c1); rootStyle.setProperty("--c2",t.c2);
    if(active<0) counter.classList.remove("show");
    else{ counter.textContent=String(active+1).padStart(2,"0")+" / "+String(N).padStart(2,"0"); counter.classList.add("show"); }
    targetColor.set(t.c1);
    lastActive=active;
  }
}

/* rotação alvo: contínua do hero ao último time; escudo encara você no centro de cada seção */
function targetRot(){
  if(state.active<0) return -0.5*Math.PI*state.heroT;      // hero: começa de frente, vira até o perfil
  return (state.i + (state.p-0.5))*Math.PI;                 // seção k centrada => k*180°
}

/* flip de carta real: frente e verso carregam times diferentes, e cada face
   só é atualizada enquanto está ESCONDIDA atrás da outra => troca invisível */
function swapByRotation(){
  const rot=shield.rotation.y/Math.PI;                 // rotação em meias-voltas
  const f=clamp(2*Math.round(rot/2),0,N-1);            // frente: índice par mais próximo (muda quando rot é ímpar = frente oculta)
  const b=clamp(2*Math.round((rot-1)/2)+1,0,N-1);      // verso: índice ímpar mais próximo (muda quando rot é par = verso oculto)
  const m=clamp(Math.round(rot),0,N-1);                // miolo escuro segue quem está de frente (muda de perfil)
  if(f!==frontTeam){ frontMat.map=sets[f].tex; frontMat.needsUpdate=true; frontTeam=f; }
  if(b!==backTeam){  backMat.map=sets[b].tex;  backMat.needsUpdate=true;  backTeam=b; }
  if(m!==midTeam){   midMat.map=sets[m].dark;  midMat.needsUpdate=true;   midTeam=m; }
}

/* loop */
const clock=new THREE.Clock();
const activeColor=new THREE.Color("#C52613"), targetColor=new THREE.Color("#C52613");
function animate(){
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
  readScroll();

  // escudo desaparece durante as perguntas do quiz e volta como troféu no resultado
  const sT=(state.inQuiz && !quiz.result)?0:1;
  shieldScale += (sT-shieldScale)*Math.min(1,dt*5);
  shield.scale.setScalar(Math.max(0.001,shieldScale));

  if(state.inQuiz && quiz.result){
    if(frontTeam!==-1 && customSet){
      frontMat.map=customSet.tex; backMat.map=customSet.tex; midMat.map=customSet.dark;
      frontMat.needsUpdate=backMat.needsUpdate=midMat.needsUpdate=true;
      frontTeam=backTeam=midTeam=-1;
    }
    shield.position.x += (0-shield.position.x)*Math.min(1,dt*4);   // centraliza
    shield.position.y = 0.55 + Math.sin(t*1.1)*0.05;
    shield.rotation.y += dt*0.7;                                    // vitrine girando
  }else{
    shield.position.x += (baseX-shield.position.x)*Math.min(1,dt*6);
    shield.rotation.y += (targetRot() - shield.rotation.y)*Math.min(1,dt*7);
    swapByRotation();
    shield.position.y = baseY + Math.sin(t*1.1)*0.05;
  }

  // vida: leve balanço + parallax do mouse
  shield.rotation.x += ((0.05 + mouse.y*0.1) - shield.rotation.x)*Math.min(1,dt*4);
  shield.rotation.z = Math.sin(t*0.6)*0.02;

  activeColor.lerp(targetColor, Math.min(1,dt*3));
  rimLightA.color.copy(activeColor);
  keyGlow.color.copy(activeColor);

  starsA.rotation.y += dt*0.015;
  starsB.rotation.y -= dt*0.008;
  starsC.material.opacity = 0.38 + Math.sin(t*1.7)*0.14 + Math.sin(t*4.3)*0.05; // cintilação
  nebA.rotation.z += dt*0.004;
  nebB.rotation.z -= dt*0.003;

  composer.render();
}

init().catch(err=>{
  console.error("Falha ao iniciar 3D:",err);
  window.__three3d={ok:false, err:String(err&&err.message||err)};
  boot.innerHTML='<p style="position:static">Não foi possível iniciar o WebGL/3D neste navegador.<br>'+String(err&&err.message||err)+'</p>';
});
</script>
